[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "swuift"
version = "0.1.0"
description = "SWUIFT wildfire-urban-interface simulation (Python)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "swuift-core",
  "numpy",
  "scipy",
  "h5py",
  "numba",
  "matplotlib",
  "imageio[ffmpeg]",
  "tqdm",
  "av"
]

[project.scripts]
swuift = "swuift.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["swuift*"]
