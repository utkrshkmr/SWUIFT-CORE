name: Build SWUIFT desktop app

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  macos-arm64:
    name: macOS arm64 (.app + .dmg)
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Install build dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure SWUIFT.ico exists
        run: |
          if [ ! -f SWUIFT.ico ]; then
            python - <<'PY'
          from PIL import Image
          img = Image.open("SWUIFT.icns")
          img.save("SWUIFT.ico", format="ICO",
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          PY
          fi

      - name: Build .app with PyInstaller
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          ls -la dist

      - name: Create .dmg
        run: |
          STAGE=$(mktemp -d)
          cp -R "dist/SWUIFT.app" "$STAGE/"
          hdiutil create \
            -volname "SWUIFT" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "dist/SWUIFT_macOS_arm64.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: SWUIFT-macos-arm64
          path: |
            apps/desktop/dist/SWUIFT.app
            apps/desktop/dist/SWUIFT_macOS_arm64.dmg
          if-no-files-found: error

  windows-x64:
    name: Windows x64 (.exe + Inno Setup installer)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install build dependencies
        working-directory: .
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure SWUIFT.ico exists
        shell: pwsh
        run: |
          if (-not (Test-Path "SWUIFT.ico")) {
            python -c "from PIL import Image; img=Image.open('SWUIFT.icns'); img.save('SWUIFT.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          }

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          Get-ChildItem dist

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & "$iscc" swuift_setup.iss

      - uses: actions/upload-artifact@v7
        with:
          name: SWUIFT-windows-x64
          path: |
            apps/desktop/dist/SWUIFT/**
            apps/desktop/dist/SWUIFT_Setup_*.exe
          if-no-files-found: error

  windows-arm64:
    name: Windows ARM64 (.exe)
    runs-on: windows-11-arm
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/desktop
    env:
      SWUIFT_APP_KERNEL_BACKEND: python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Install build dependencies without Numba
        working-directory: .
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy scipy h5py matplotlib "imageio[ffmpeg]" tqdm PySide6 Pillow pyinstaller

      - name: Ensure SWUIFT.ico exists
        shell: pwsh
        run: |
          if (-not (Test-Path "SWUIFT.ico")) {
            python -c "from PIL import Image; img=Image.open('SWUIFT.icns'); img.save('SWUIFT.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          }

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          Get-ChildItem dist

      - uses: actions/upload-artifact@v7
        with:
          name: SWUIFT-windows-arm64
          path: |
            apps/desktop/dist/SWUIFT/**
          if-no-files-found: error
